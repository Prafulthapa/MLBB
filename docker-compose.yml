锘縱ersion: '3.9'

services:

  # 芒鈥濃偓芒鈥濃偓 PostgreSQL Database 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  db:
    image: postgres:16-alpine
    container_name: mlbb_db
    restart: always
    environment:
      POSTGRES_USER: mlbbuser
      POSTGRES_PASSWORD: mlbbpassword
      POSTGRES_DB: mlbb_topup
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - mlbb_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlbbuser -d mlbb_topup"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 芒鈥濃偓芒鈥濃偓 Node.js API 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mlbb_api
    restart: always
    environment:
      DATABASE_URL: postgresql://mlbbuser:mlbbpassword@db:5432/mlbb_topup
      JWT_SECRET: change_this_to_a_long_secret_before_deploy_xyz789
      PORT: 4000
      ADMIN_EMAIL: admin@mlbbtopup.com
      ADMIN_PASSWORD: Admin@1234
    volumes:
      - uploads_data:/app/uploads
    networks:
      - mlbb_net
    depends_on:
      db:
        condition: service_healthy

  # 芒鈥濃偓芒鈥濃偓 nginx (serves frontend + proxies API) 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  nginx:
    image: nginx:alpine
    container_name: mlbb_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./mlbb-topup.html:/usr/share/nginx/html/mlbb-topup.html:ro
      - ./admin:/usr/share/nginx/html/admin:ro
      - ssl_certs:/etc/letsencrypt:ro
    networks:
      - mlbb_net
    depends_on:
      - api

networks:
  mlbb_net:
    driver: bridge

volumes:
  db_data:
  uploads_data:
  ssl_certs: